<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/logos/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      data-react-helmet="true"
      content=""
    />
    <link rel="apple-touch-icon" href="/logos/favicon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta http-equiv="Content-Security-Policy"
          content="script-src 'self' 'unsafe-eval' https://cdn.form.io https://nominatim.openstreetmap.org;" />
    <!--
      Notice the use of  in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.png" or "favicon.png", "/favicon.png" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <script src="/environment.js"></script>
    <script src="/registry-environment.js"></script>
    <script src="/registry-settings.js"></script>
    <script type="module" src="/src/index.tsx"></script>
    <title></title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
